<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Founder Announcement Panel</title><style>body{font-family:Arial,sans-serif;background:#eef2f7;padding:20px}.panel{max-width:760px;margin:auto;background:#fff;padding:24px;border-radius:18px;box-shadow:0 8px 25px rgba(0,0,0,.12)}.overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;justify-content:center;align-items:center}.login{background:#fff;padding:30px;border-radius:16px;text-align:center}.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin:12px 0}@media(max-width:600px){.grid{grid-template-columns:1fr}}button,input,textarea{padding:12px;border-radius:10px;font-size:15px}textarea{width:100%;height:110px;border:1px solid #ccc;margin:8px 0;box-sizing:border-box}button{border:none;color:#fff;cursor:pointer}.preset{background:#3498db}.announce{background:#27ae60}.stop{background:#e74c3c}.actions{display:grid;grid-template-columns:1fr 1fr;gap:8px}#status{margin-top:14px;font-weight:bold;min-height:24px}</style></head><body><div class="overlay" id="overlay"><div class="login"><h2>Founder Access</h2><input id="pin" type="password" placeholder="Enter PIN"><br><br><button class="announce" onclick="login()">Unlock</button><p id="pinMsg"></p></div></div><div class="panel"><h1>Founder Announcement Panel</h1><div class="grid"><button class="preset" onclick="setMsg('The meeting will begin in ten minutes.')">Meeting in 10 Minutes</button><button class="preset" onclick="setMsg('Mr. Sharma, please report to reception.')">Call Mr. Sharma</button><button class="preset" onclick="setMsg('All department heads are requested to assemble in the conference room.')">Department Heads Meeting</button><button class="preset" onclick="setMsg('Visitors are requested to wait in the lobby area.')">Visitor Notice</button></div><textarea id="msg" placeholder="Type announcement..."></textarea><div class="actions"><button class="announce" onclick="announce()">📢 Announce</button><button class="stop" onclick="stopAll()">⛔ Stop</button></div><div id="status">🟢 Ready to start</div></div><script>let defaultVoice=null,dotsInterval,audioContext=null,repeatTimeout=null,chimeTimeout=null;const statusEl=document.getElementById('status'),msgEl=document.getElementById('msg');function login(){if(document.getElementById('pin').value==='5060')overlay.style.display='none';else pinMsg.textContent='Invalid PIN'}function setMsg(t){msgEl.value=t}function loadVoices(){const v=speechSynthesis.getVoices();defaultVoice=v.find(x=>x.name==='Google US English')||v.find(x=>x.lang==='en-US')||v[0]}speechSynthesis.onvoiceschanged=loadVoices;loadVoices();function playChime(cb){const A=window.AudioContext||window.webkitAudioContext;audioContext=new A();[[523,1.2],[659,1.2]].forEach(([f,d],i)=>{const o=audioContext.createOscillator(),g=audioContext.createGain(),t=audioContext.currentTime+i*1.45;o.frequency.value=f;o.type='sine';o.connect(g);g.connect(audioContext.destination);g.gain.setValueAtTime(.12,t);g.gain.exponentialRampToValueAtTime(.001,t+d);o.start(t);o.stop(t+d)});chimeTimeout=setTimeout(cb,2900)}function speak(text,cb){const u=new SpeechSynthesisUtterance(text);if(defaultVoice)u.voice=defaultVoice;u.rate=.9;u.onend=()=>cb&&cb();speechSynthesis.speak(u)}function startDots(){let c=1;statusEl.textContent='🔊 Announcing.';dotsInterval=setInterval(()=>{c=c%3+1;statusEl.textContent='🔊 Announcing'+'.'.repeat(c)},500)}function stopDots(m){clearInterval(dotsInterval);statusEl.textContent='✅ Announced! ('+m+')'}function stopAll(){speechSynthesis.cancel();clearInterval(dotsInterval);clearTimeout(repeatTimeout);clearTimeout(chimeTimeout);if(audioContext){audioContext.close();audioContext=null}statusEl.textContent='⛔ Announcement terminated'}function announce(){const m=msgEl.value.trim();if(!m)return alert('Please enter an announcement.');stopAll();statusEl.textContent='🔔 Preparing announcement...';playChime(()=>setTimeout(()=>{startDots();speak('Attention please. '+m,()=>{repeatTimeout=setTimeout(()=>{speak('I repeat. '+m+'. Thank you.',()=>stopDots(m))},1500)})},50))}</script></body></html>
